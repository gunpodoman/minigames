name: Deploy VOID ARCADE

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract arcade package
        shell: bash
        run: |
          set -euo pipefail

          test -f VOID_ARCADE_FULL.zip || {
            echo "VOID_ARCADE_FULL.zip 파일이 저장소 최상단에 없습니다."
            exit 1
          }

          rm -rf .void-arcade
          mkdir .void-arcade
          unzip -q VOID_ARCADE_FULL.zip -d .void-arcade

      - name: Build game catalog
        run: python .void-arcade/tools/build_games.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .void-arcade/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
